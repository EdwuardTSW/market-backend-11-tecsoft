spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/market}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:2213}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
